<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>✨ Stylish Task Manager</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 380px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  .input-group {
    display: flex;
    gap: 10px;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  button {
    border: none;
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  .add {
    background: #4facfe;
    color: white;
  }

  .add:hover { transform: scale(1.05); }

  ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
  }

  li {
    background: #f7f7f7;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .actions button {
    margin-left: 5px;
  }

  .edit { background: #f6ad55; color: white; }
  .delete { background: #fc8181; color: white; }
  .done { background: #68d391; color: white; }

  .completed {
    text-decoration: line-through;
    color: gray;
  }
</style>
</head>

<body>

<div class="container">
  <h2>✨ Task Manager</h2>

  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button class="add" onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

function save() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

function render() {
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  tasks.forEach((task, i) => {
    const li = document.createElement('li');

    const text = document.createElement('span');
    text.textContent = task.text;
    if (task.done) text.classList.add('completed');

    const actions = document.createElement('div');
    actions.className = 'actions';

    const doneBtn = document.createElement('button');
    doneBtn.textContent = '✔';
    doneBtn.className = 'done';
    doneBtn.onclick = () => toggle(i);

    const editBtn = document.createElement('button');
    editBtn.textContent = '✏';
    editBtn.className = 'edit';
    editBtn.onclick = () => edit(i);

    const delBtn = document.createElement('button');
    delBtn.textContent = '❌';
    delBtn.className = 'delete';
    delBtn.onclick = () => remove(i);

    actions.append(doneBtn, editBtn, delBtn);
    li.append(text, actions);
    list.appendChild(li);
  });
}

function addTask() {
  const input = document.getElementById('taskInput');
  if (!input.value.trim()) return;

  tasks.push({ text: input.value, done: false });
  input.value = '';
  save();
  render();
}

function toggle(i) {
  tasks[i].done = !tasks[i].done;
  save();
  render();
}

function edit(i) {
  const newText = prompt('Edit task', tasks[i].text);
  if (newText) {
    tasks[i].text = newText;
    save();
    render();
  }
}

function remove(i) {
  tasks.splice(i, 1);
  save();
  render();
}

render();
</script>

</body>
</html>
